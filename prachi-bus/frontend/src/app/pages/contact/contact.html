<div class="max-w-4xl mx-auto py-12 px-4">
  <div class="text-center mb-12">
    <h1 class="text-4xl font-bold text-gray-800">Contact Us</h1>
    <p class="text-lg text-gray-600 mt-4">We'd love to hear from you!</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
    <div class="bg-white p-8 rounded-xl shadow-md border">
      <h3 class="text-2xl font-bold mb-6">Get in Touch</h3>

      <div *ngIf="success()" class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm font-medium">
        Message sent! We'll get back to you soon.
      </div>
      <div *ngIf="error()" class="mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
        {{ error() }}
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Name</label>
          <input type="text" [(ngModel)]="name" name="name" placeholder="Your Name"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="Your Email"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
        </div>
        <div class="mb-4">
          <label class="block text-sm font-medium mb-1">Message</label>
          <textarea [(ngModel)]="message" name="message" placeholder="Your Message" rows="5"
            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-primary outline-none"></textarea>
        </div>
        <button type="submit" [disabled]="loading()"
          class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-rose-700 transition-colors disabled:opacity-50">
          {{ loading() ? 'Sending...' : 'Send Message' }}
        </button>
      </form>
    </div>

    <div class="space-y-6">
      <div class="bg-white p-6 rounded-xl shadow-md border">
        <h4 class="font-bold text-lg">Address</h4>
        <p class="text-gray-600 mt-1">123, ABC Road, Ahmedabad, Gujarat - 380001</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-md border">
        <h4 class="font-bold text-lg">Email</h4>
        <p class="text-gray-600 mt-1">support&#64;prachibus.com</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-md border">
        <h4 class="font-bold text-lg">Phone</h4>
        <p class="text-gray-600 mt-1">+91 98765 43210</p>
      </div>
    </div>
  </div>
</div>
